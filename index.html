<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusFlow - プレミアム・ポモドーロタイマー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 背景のネオンオーブ -->
  <div class="orb-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app-container">
    <!-- ヘッダー -->
    <header class="app-header">
      <div class="logo">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <h1>FocusFlow</h1>
      </div>
      <button id="settings-toggle-btn" class="icon-btn" aria-label="設定を開く" title="設定">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- メインコンテンツ -->
    <main class="app-main">
      <!-- 左コラム: タイマー -->
      <section class="timer-section glass-panel">
        <!-- モード切替タブ -->
        <div class="mode-tabs">
          <button id="mode-work" class="tab-btn active" data-mode="work">作業</button>
          <button id="mode-short" class="tab-btn" data-mode="short">短い休憩</button>
          <button id="mode-long" class="tab-btn" data-mode="long">長い休憩</button>
        </div>

        <!-- 円形タイマー -->
        <div class="timer-display-container">
          <svg class="progress-ring" viewBox="0 0 220 220">
            <!-- 背景サークル -->
            <circle class="progress-ring__background" cx="110" cy="110" r="95" />
            <!-- 進捗サークル -->
            <circle id="timer-progress" class="progress-ring__circle" cx="110" cy="110" r="95" />
          </svg>
          <div class="timer-text-container">
            <span id="time-display">25:00</span>
            <span id="active-mode-label" class="mode-label">作業中</span>
          </div>
        </div>

        <!-- アクティブなタスク表示 -->
        <div class="active-task-container">
          <p class="section-label">現在のフォーカス先</p>
          <p id="current-task-name" class="current-task-placeholder">タスクが選択されていません</p>
        </div>

        <!-- 操作コントロール -->
        <div class="timer-controls">
          <button id="reset-btn" class="control-btn secondary" title="リセット">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
            </svg>
          </button>
          
          <button id="play-pause-btn" class="control-btn primary" title="開始">
            <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            <svg id="pause-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="6" y="4" width="4" height="16" rx="1"/>
              <rect x="14" y="4" width="4" height="16" rx="1"/>
            </svg>
          </button>

          <button id="skip-btn" class="control-btn secondary" title="スキップ">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 4 15 12 5 20 5 4"/>
              <line x1="19" y1="5" x2="19" y2="19"/>
            </svg>
          </button>
        </div>
      </section>

      <!-- 右コラム: タスク管理 & 統計 -->
      <div class="sidebar-section">
        <!-- タスクリスト -->
        <section class="tasks-section glass-panel">
          <h2 class="panel-title">
            <svg class="panel-title-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9M3 20h.01M3 12h.01M3 4h.01M4 4h10M4 12h14M4 20h14"/>
            </svg>
            タスク管理
          </h2>
          
          <form id="add-task-form" class="task-form">
            <input type="text" id="task-input" placeholder="新しいタスクを入力..." required autocomplete="off">
            <button type="submit" class="add-task-btn" title="追加">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </form>

          <ul id="task-list" class="task-list">
            <!-- 動的に生成されます -->
          </ul>
        </section>

        <!-- 統計ダッシュボード -->
        <section class="stats-section glass-panel">
          <h2 class="panel-title">
            <svg class="panel-title-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 20V10M12 20V4M6 20v-6"/>
            </svg>
            今日のフォーカス統計
          </h2>
          
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon timer-theme">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
              </div>
              <div class="stat-info">
                <span id="stat-sessions" class="stat-value">0</span>
                <span class="stat-label">セッション完了</span>
              </div>
            </div>

            <div class="stat-card">
              <div class="stat-icon time-theme">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
              </div>
              <div class="stat-info">
                <span id="stat-total-time" class="stat-value">0m</span>
                <span class="stat-label">総集中時間</span>
              </div>
            </div>

            <div class="stat-card">
              <div class="stat-icon check-theme">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                  <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
              </div>
              <div class="stat-info">
                <span id="stat-completed-tasks" class="stat-value">0</span>
                <span class="stat-label">完了タスク</span>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <!-- 設定モーダルダイアログ -->
    <div id="settings-modal" class="modal-overlay hidden">
      <div class="modal-content glass-panel">
        <div class="modal-header">
          <h3>タイマー設定</h3>
          <button id="settings-close-btn" class="icon-btn small" aria-label="設定を閉じる">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        
        <div class="modal-body">
          <div class="settings-group">
            <h4>セッション時間（分）</h4>
            <div class="time-inputs-grid">
              <div class="input-field">
                <label for="input-work">作業</label>
                <input type="number" id="input-work" min="1" max="60" value="25">
              </div>
              <div class="input-field">
                <label for="input-short">短い休憩</label>
                <input type="number" id="input-short" min="1" max="30" value="5">
              </div>
              <div class="input-field">
                <label for="input-long">長い休憩</label>
                <input type="number" id="input-long" min="1" max="60" value="15">
              </div>
            </div>
          </div>

          <div class="settings-group">
            <h4>通知設定</h4>
            <div class="sound-control">
              <label for="input-volume">通知音量</label>
              <div class="volume-slider-container">
                <input type="range" id="input-volume" min="0" max="100" value="50">
                <span id="volume-value">50%</span>
              </div>
            </div>
            <button id="test-sound-btn" class="btn secondary">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
              通知音をテスト再生
            </button>
          </div>

          <div class="settings-group">
            <h4>データ管理</h4>
            <button id="reset-stats-btn" class="btn danger">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
              統計データをリセット
            </button>
          </div>
        </div>

        <div class="modal-footer">
          <button id="settings-save-btn" class="btn primary">保存して閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="app-footer">
    <p>FocusFlow &copy; 2026 - Antigravity 開発サンプル</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
